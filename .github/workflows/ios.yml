name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'
    
    - name: Install dependencies
      run: yarn install
    
    - name: Install iOS dependencies
      run: |
        cd ios
        pod install
        # 统一设置iOS部署目标版本为15.0
        find . -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' {} +
        cd ..
    
    - name: Build iOS app
      run: |
        cd ios
        # 设置项目路径
        export PROJECT_PATH=$(pwd)
        
        # 构建主应用
        xcodebuild -workspace CyMusic.xcworkspace -scheme CyMusic -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY="" CODE_SIGN_STYLE=Manual
        
        # 构建ShareExtension
        xcodebuild -workspace CyMusic.xcworkspace -scheme ShareExtension -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY="" CODE_SIGN_STYLE=Manual
        
        # 创建IPA包
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/CyMusic.app Payload/
        cp -r build/Build/Products/Release-iphoneos/ShareExtension.appex Payload/CyMusic.app/PlugIns/
        zip -r CyMusic.ipa Payload
        cd ..
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CyMusic.ipa
        path: ios/CyMusic.ipa 