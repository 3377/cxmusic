name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'
    
    - name: Install dependencies
      run: yarn install
    
    - name: Install iOS dependencies
      run: |
        cd ios
        pod install
        cd ..
    
    - name: Fix ShareExtension path
      run: |
        cd ios
        # 修复ShareExtension-Info.plist路径问题
        mkdir -p /Users/gyc/Code/music-player-master/ios/ShareExtension
        cp ShareExtension/ShareExtension-Info.plist /Users/gyc/Code/music-player-master/ios/ShareExtension/
        cd ..
    
    - name: Build iOS app
      run: |
        cd ios
        # 设置环境变量
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        
        # 构建Release版本
        xcodebuild -workspace CyMusic.xcworkspace -scheme CyMusic -configuration Release -sdk iphoneos -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY="" \
          CODE_SIGN_STYLE=Manual \
          IPHONEOS_DEPLOYMENT_TARGET=15.0
        
        # 创建IPA包
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/CyMusic.app Payload/
        if [ -d "build/Build/Products/Release-iphoneos/ShareExtension.appex" ]; then
          mkdir -p Payload/CyMusic.app/PlugIns
          cp -r build/Build/Products/Release-iphoneos/ShareExtension.appex Payload/CyMusic.app/PlugIns/
        fi
        zip -r CyMusic.ipa Payload
        cd ..
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CyMusic.ipa
        path: ios/CyMusic.ipa 